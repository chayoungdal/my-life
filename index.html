<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="나의 하루">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<title>나의 하루</title>
<style>
:root {
  --primary: #4F6AF0;
  --primary-light: #E8ECFD;
  --primary-dark: #3B50C4;
  --accent: #F08C4F;
  --accent-light: #FDF0E8;
  --success: #34A853;
  --success-light: #E6F4EA;
  --warning: #FBBC04;
  --warning-light: #FEF7E0;
  --danger: #EA4335;
  --danger-light: #FCE8E6;
  --text: #1A1A2E;
  --text-secondary: #6B7280;
  --bg: #F8F9FC;
  --surface: #FFFFFF;
  --border: #E5E7EB;
  --border-light: #F0F1F4;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --radius: 14px;
  --radius-sm: 10px;
  --transition: 0.2s ease;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding-top: var(--safe-top);
  padding-bottom: calc(70px + var(--safe-bottom));
  overflow-x: hidden;
}

/* Tab Bar */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}

.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 4px;
  font-size: 10px;
  color: var(--text-secondary);
  cursor: pointer;
  border: none;
  background: none;
  transition: color var(--transition);
  gap: 2px;
}

.tab-item.active { color: var(--primary); }
.tab-item .tab-icon { font-size: 22px; }
.tab-item .tab-label { font-weight: 500; }

/* Main Content */
.main {
  padding: 20px 24px 0;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}

@media (min-width: 768px) {
  .main { padding: 28px 40px 0; }
  .stat-row { grid-template-columns: repeat(4, 1fr); }
}

.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-top: 8px;
}

.page-header h2 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all var(--transition);
}

.btn-primary { background: var(--primary); color: white; }
.btn-primary:active { background: var(--primary-dark); transform: scale(0.96); }
.btn-secondary { background: var(--primary-light); color: var(--primary); }
.btn-sm { padding: 8px 14px; font-size: 13px; }
.btn-icon { padding: 10px; border-radius: var(--radius-sm); background: none; border: 1px solid var(--border); cursor: pointer; font-size: 18px; }
.btn-icon:active { background: var(--primary-light); }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}

.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.card-title { font-size: 15px; font-weight: 600; }

/* Dashboard Grid */
.stat-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
}

.stat-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
.stat-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
.stat-value.primary { color: var(--primary); }
.stat-value.success { color: var(--success); }
.stat-value.accent { color: var(--accent); }

/* Form */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }

.form-input, .form-textarea, .form-select {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-family: inherit;
  color: var(--text);
  background: var(--surface);
  -webkit-appearance: none;
  transition: border-color var(--transition);
}

.form-input:focus, .form-textarea:focus, .form-select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}

.form-textarea { resize: vertical; min-height: 100px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* List Items */
.list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  transition: all var(--transition);
}

.list-item:active { background: var(--primary-light); }

.checkbox {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-radius: 7px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
  font-size: 14px;
}

.checkbox.checked { background: var(--success); border-color: var(--success); color: white; }
.item-content { flex: 1; min-width: 0; }
.item-title { font-size: 15px; font-weight: 500; }
.item-title.completed { text-decoration: line-through; color: var(--text-secondary); }
.item-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

/* Tags */
.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.tag-primary { background: var(--primary-light); color: var(--primary); }
.tag-accent { background: var(--accent-light); color: var(--accent); }
.tag-success { background: var(--success-light); color: var(--success); }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  justify-content: center;
  align-items: flex-end;
  backdrop-filter: blur(4px);
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--surface);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 24px 20px calc(20px + var(--safe-bottom));
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-size: 18px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-secondary); padding: 4px 8px; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.modal-actions .btn { flex: 1; justify-content: center; padding: 14px; }

/* Empty State */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state .message { font-size: 14px; line-height: 1.6; }

/* Date Navigation */
.date-nav {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

.date-nav .current-date {
  flex: 1;
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  padding: 10px;
  background: var(--primary-light);
  border-radius: var(--radius-sm);
  color: var(--primary);
}

/* Scripture */
.scripture-verse {
  font-size: 17px;
  line-height: 1.8;
  padding: 18px;
  background: linear-gradient(135deg, var(--primary-light), #f0e8fd);
  border-radius: var(--radius-sm);
  border-left: 4px solid var(--primary);
  margin-bottom: 12px;
}

.scripture-ref {
  text-align: right;
  color: var(--primary);
  font-weight: 600;
  font-size: 14px;
}

/* Prayer */
.prayer-card {
  padding: 16px;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #fef9f4, #fdf0e8);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--accent);
}

.prayer-card.answered {
  background: linear-gradient(135deg, #f0faf2, var(--success-light));
  border-left-color: var(--success);
}

/* Idea */
.idea-card {
  border-left: 4px solid var(--primary);
  padding: 16px;
  margin-bottom: 12px;
  background: var(--surface);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  border-top: 1px solid var(--border-light);
  border-right: 1px solid var(--border-light);
  border-bottom: 1px solid var(--border-light);
}

.idea-card.priority-high { border-left-color: var(--danger); }
.idea-card.priority-medium { border-left-color: var(--warning); }

/* Toast */
.toast {
  position: fixed;
  top: calc(20px + var(--safe-top));
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  padding: 12px 24px;
  background: var(--text);
  color: white;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  z-index: 300;
  opacity: 0;
  transition: all 0.3s ease;
}

.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* Backup banner */
.backup-banner {
  background: var(--warning-light);
  border: 1px solid var(--warning);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}

/* Swipe delete */
.swipe-actions {
  display: flex;
  gap: 4px;
  margin-left: 8px;
}

.diary-content { white-space: pre-wrap; line-height: 1.8; font-size: 15px; }

/* Sermon Editor (GoodNotes 스타일) */
.se-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 8px; }
.se-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.se-toolbar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; margin-bottom: 10px; position: sticky; top: 0; z-index: 10; }
.se-tool { padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text); }
.se-tool.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.se-color { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px var(--border); cursor: pointer; flex-shrink: 0; }
.se-color.active { box-shadow: 0 0 0 2px var(--primary); }
.se-page-wrap { border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); overflow: hidden; background: #fff; }
.se-page { position: relative; background-image: repeating-linear-gradient(#fff, #fff 33px, #dbe1ee 34px); }
.se-text { position: absolute; inset: 0; width: 100%; height: 100%; border: none; outline: none; background: transparent; resize: none; font-size: 17px; line-height: 34px; padding: 5px 16px; font-family: inherit; color: var(--text); }
.se-canvas { position: absolute; inset: 0; touch-action: none; }
.se-pagenav { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 14px; }
@media (max-width: 767px) { .se-meta { grid-template-columns: 1fr; } }

/* Calendar */
.cal-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.cal-month { flex: 1; text-align: center; font-size: 17px; font-weight: 700; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-head { margin-bottom: 4px; }
.cal-weekday { text-align: center; font-size: 12px; font-weight: 600; color: var(--text-secondary); padding: 4px 0; }
.cal-weekday.sun { color: var(--danger); }
.cal-weekday.sat { color: var(--primary); }
.cal-cell {
  min-height: 92px;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  padding: 6px;
  cursor: pointer;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.cal-cell:active { background: var(--primary-light); }
.cal-cell.empty { background: transparent; border: none; }
.cal-cell.today { border-color: var(--primary); background: var(--primary-light); }
.cal-daynum { font-size: 13px; font-weight: 600; }
.cal-daynum.sun { color: var(--danger); }
.cal-daynum.sat { color: var(--primary); }
.cal-items { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
.cal-event {
  font-size: 10px;
  background: var(--primary-light);
  color: var(--primary-dark);
  border-radius: 4px;
  padding: 1px 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cal-event.done { text-decoration: line-through; opacity: 0.5; }
.cal-time { font-weight: 700; }
.cal-more { font-size: 9px; color: var(--text-secondary); padding-left: 3px; }
@media (min-width: 768px) {
  .cal-cell { min-height: 120px; padding: 8px; }
  .cal-event { font-size: 12px; padding: 2px 6px; }
  .cal-daynum { font-size: 15px; }
}

/* Investment table */
.invest-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--border-light);
}

.invest-item:last-child { border-bottom: none; }

/* Drawer (서랍 메뉴) */
.drawer-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.25s;
  backdrop-filter: blur(2px);
}
.drawer-overlay.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed; top: 0; left: 0; bottom: 0; width: 280px; max-width: 82vw;
  background: var(--surface); z-index: 160; overflow-y: auto;
  padding: calc(20px + var(--safe-top)) 0 20px;
  transform: translateX(-100%); transition: transform 0.28s ease;
  box-shadow: 4px 0 24px rgba(0,0,0,0.12);
}
.drawer.open { transform: translateX(0); }
.drawer-header { padding: 0 24px 20px; border-bottom: 1px solid var(--border-light); margin-bottom: 8px; }
.drawer-header h1 { font-size: 22px; font-weight: 700; color: var(--primary); }
.drawer-date { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.drawer-section {
  padding: 14px 24px 6px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.5px; color: var(--text-secondary);
}
.drawer-item {
  display: flex; align-items: center; gap: 14px;
  width: calc(100% - 16px); margin: 2px 8px; padding: 13px 18px;
  border: none; background: none; border-radius: 12px;
  font-size: 16px; font-weight: 500; color: var(--text);
  text-align: left; cursor: pointer;
}
.drawer-item.active { background: var(--primary); color: #fff; }
.drawer-item:active { background: var(--primary-light); }
.drawer-item.active:active { background: var(--primary); }
.di-ic { font-size: 20px; width: 26px; text-align: center; }
</style>
</head>

<script>
// === IndexedDB Storage ===
const DB_NAME = 'MyLifeSystem';
const DB_VERSION = 2;
const STORES = ['schedules','routines','plans','scriptures','prayers','diary','investments','savings','ideas','sermons','meta'];

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      STORES.forEach(name => {
        if (!db.objectStoreNames.contains(name)) {
          const store = db.createObjectStore(name, { keyPath: 'id', autoIncrement: true });
          if (name !== 'meta') {
            store.createIndex('date', 'date', { unique: false });
          }
        }
      });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

let dbInstance;
async function getDB() {
  if (!dbInstance) dbInstance = await openDB();
  return dbInstance;
}

async function dbGetAll(store, dateFilter) {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const s = tx.objectStore(store);
    if (dateFilter) {
      const idx = s.index('date');
      const req = idx.getAll(dateFilter);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    } else {
      const req = s.getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    }
  });
}

async function dbAdd(store, data) {
  const db = await getDB();
  data.created_at = new Date().toISOString();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).add(data);
    req.onsuccess = () => { data.id = req.result; resolve(data); };
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(store, data) {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(data);
    req.onsuccess = () => resolve(data);
    req.onerror = () => reject(req.error);
  });
}

async function dbDelete(store, id) {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function dbGet(store, id) {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// === App Logic ===
function toLocalYMD(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
let currentDate = toLocalYMD(new Date());

window.updateRef = function() {

// === BACKUP ===
async function exportBackup() {
  const data = {};
  for (const store of STORES.filter(s => s !== 'meta')) {
    data[store] = await dbGetAll(store);
  }
  data.exportDate = new Date().toISOString();
  data.version = 1;

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `나의하루_백업.json`;
  a.click();
  URL.revokeObjectURL(url);

  localStorage.setItem('lastBackup', new Date().toISOString());
  toast('백업 파일이 저장되었습니다');
}

async function importBackup(file) {
  const text = await file.text();
  const data = JSON.parse(text);

  if (!data.version) { toast('올바른 백업 파일이 아닙니다'); return; }

  for (const store of STORES.filter(s => s !== 'meta')) {
    if (!data[store]) continue;
    const db = await getDB();
    const tx = db.transaction(store, 'readwrite');
    const s = tx.objectStore(store);
    s.clear();
    for (const item of data[store]) {
      s.add(item);
    }
  }

  localStorage.setItem('lastBackup', new Date().toISOString());
  toast('데이터가 복원되었습니다');
  renderPage();
}

function checkBackupReminder() {
  const last = localStorage.getItem('lastBackup');
  if (!last) return true;
  const diff = (Date.now() - new Date(last).getTime()) / (1000 * 60 * 60 * 24);
  return diff >= 7;
}

// === SCHEDULE (월 달력) ===
async function renderSchedule() {
  const all = await dbGetAll('schedules');
  const base = new Date(currentDate + 'T00:00:00');
  const year = base.getFullYear();
  const month = base.getMonth();
  const startWeekday = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = toLocalYMD(new Date());

  const byDate = {};
  all.forEach(s => { (byDate[s.date] = byDate[s.date] || []).push(s); });
  Object.values(byDate).forEach(a => a.sort((x, y) => (x.time || '').localeCompare(y.time || '')));

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const weekdays = ['일', '월', '화', '수', '목', '금', '토'];

  $('#mainContent').innerHTML = `
    <div class="page-header">
      <h2>스케줄</h2>
      <button class="btn btn-primary" onclick="showScheduleModal()">+ 추가</button>
    </div>
    <div class="cal-nav">
      <button class="btn-icon" onclick="changeMonth(-1)">&larr;</button>
      <span class="cal-month">${year}년 ${month + 1}월</span>
      <button class="btn-icon" onclick="changeMonth(1)">&rarr;</button>
      <button class="btn btn-sm btn-secondary" onclick="goToday()">오늘</button>
    </div>
    <div class="cal-grid cal-head">
      ${weekdays.map((w, i) => `<div class="cal-weekday ${i === 0 ? 'sun' : ''} ${i === 6 ? 'sat' : ''}">${w}</div>`).join('')}
    </div>
    <div class="cal-grid">
      ${cells.map(d => {
        if (d === null) return `<div class="cal-cell empty"></div>`;
        const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const items = byDate[ds] || [];
        const wd = new Date(year, month, d).getDay();
        return `<div class="cal-cell ${ds === todayStr ? 'today' : ''}" onclick="openDay('${ds}')">
          <div class="cal-daynum ${wd === 0 ? 'sun' : ''} ${wd === 6 ? 'sat' : ''}">${d}</div>
          <div class="cal-items">
            ${items.slice(0, 3).map(s => `<div class="cal-event ${s.completed ? 'done' : ''}">${s.time ? `<span class="cal-time">${s.time}</span> ` : ''}${esc(s.title)}</div>`).join('')}
            ${items.length > 3 ? `<div class="cal-more">+${items.length - 3}</div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

window.showArchive = async function(type) {
  const config = {
    diary:      { store: 'diary',      title: '일기',  field: 'content', page: 'diary' },
    prayers:    { store: 'prayers',    title: '기도',  field: 'content', page: 'prayer' },
    scriptures: { store: 'scriptures', title: '말씀',  field: 'verse',   page: 'scripture' },
  }[type];

  const items = (await dbGetAll(config.store))
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  const body = items.length ? items.map(it => `
    <div class="list-item" style="cursor:pointer" onclick="openArchiveDate('${config.page}','${it.date}')">
      <div class="item-content" style="min-width:0">
        <div class="item-title">${formatDate(it.date)}</div>
        <div class="item-meta" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc((it[config.field] || '').replace(/\n/g, ' '))}</div>
      </div>
      <span style="color:var(--text-secondary);flex-shrink:0">&rarr;</span>
    </div>`).join('') : '<div class="empty-state"><div class="message">기록이 없습니다</div></div>';

  showModal(`
    <div class="modal-header"><span class="modal-title">${config.title} 전체 기록 (${items.length})</span><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div style="max-height:65vh;overflow-y:auto">${body}</div>
  `);
};

window.openArchiveDate = function(page, date) {
  closeModal();
  currentDate = date;
  currentPage = page;
  $$('.tab-item').forEach(i => i.classList.remove('active'));

};

const SE_COLORS = ['#2B2B40', '#EA4335', '#1A73E8', '#34A853', '#F09300'];
let SE = null;

function parsePages(content) {
  if (!content) return [{ text: '', drawing: null }];
  try { const o = JSON.parse(content); if (o && o.__pages && Array.isArray(o.pages) && o.pages.length) return o.pages; } catch (e) {}
  return [{ text: content, drawing: null }];
}
function serializePages(pages) { return JSON.stringify({ __pages: 1, pages }); }

async function renderSermons() {
  const items = (await dbGetAll('sermons')).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  $('#mainContent').innerHTML = `
    <div class="page-header">
      <h2>&#127908; 설교노트</h2>
      <button class="btn btn-primary" onclick="openSermonEditor(0)">+ 추가</button>
    </div>
    ${items.length ? items.map(s => {
      const pages = parsePages(s.content);
      const preview = pages.map(p => p.text || '').join(' ').trim();
      return `<div class="card" style="cursor:pointer" onclick="openSermonEditor(${s.id})">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <div style="flex:1;min-width:0">
            <div style="font-size:16px;font-weight:700">${esc(s.title)}</div>
            <div class="item-meta" style="margin-top:4px">
              ${formatDate(s.date)}${s.preacher ? ' · ' + esc(s.preacher) : ''}
              ${s.reference ? ` · <span class="tag tag-primary">${esc(s.reference)}</span>` : ''} · ${pages.length}페이지
            </div>
            ${preview ? `<p style="margin-top:10px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(preview)}</p>` : ''}
          </div>
          <button class="btn-icon" style="margin-left:8px" onclick="event.stopPropagation();deleteItem('sermons', ${s.id})">&#128465;</button>
        </div>
      </div>`;
    }).join('') : '<div class="empty-state"><div class="icon">&#127908;</div><div class="message">설교노트가 없습니다.<br>말씀을 기록하세요.</div></div>'}`;
}

window.openSermonEditor = async function(id) {
  const item = id ? await dbGet('sermons', id) : { date: currentDate, title: '', preacher: '', reference: '', content: '' };
  SE = {
    id, date: item.date || currentDate, title: item.title || '', preacher: item.preacher || '',
    reference: item.reference || '', pages: parsePages(item.content), cur: 0, pen: false, erase: false, color: SE_COLORS[0],
  };
  renderSermonEditor();
};

function renderSermonEditor() {
  const p = SE.pages[SE.cur];
  const pageH = 1000;
  $('#mainContent').innerHTML = `
    <div class="se-topbar">
      <button class="btn btn-secondary btn-sm" onclick="closeSermonEditor()">&larr; 목록</button>
      <div style="font-weight:700">&#127908; 설교노트</div>
      <button class="btn btn-primary btn-sm" onclick="saveSermonEditor()">저장</button>
    </div>
    <div class="se-meta">
      <input class="form-input" id="se-title" placeholder="설교 제목" value="${esc(SE.title)}">
      <input class="form-input" id="se-date" type="date" value="${SE.date}">
      <input class="form-input" id="se-preacher" placeholder="설교자 (선택)" value="${esc(SE.preacher)}">
      <div style="display:flex;gap:6px">
        <select class="form-select" id="f-book" onchange="onBookChange()" style="flex:2"><option value="">책</option>${BIBLE_BOOKS.map((b, i) => `<option value="${i}">${b[0]}</option>`).join('')}</select>
        <select class="form-select" id="f-chap" onchange="updateRef()" style="flex:1"><option value="">장</option></select>
        <input class="form-input" id="f-vs" type="number" min="1" placeholder="절" onchange="updateRef()" style="width:56px">
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button class="btn btn-sm btn-secondary" onclick="openBible()">&#128214; 성경찾기</button>
      <input class="form-input" id="f-ref" placeholder="본문 (예: 요한복음 3:16)" value="${esc(SE.reference)}">
    </div>
    <div class="se-toolbar">
      <button class="se-tool active" id="tool-type" onclick="sePen(false)">&#9000; 타이핑</button>
      <button class="se-tool" id="tool-pen" onclick="sePen(true)">&#9998; 필기</button>
      <button class="se-tool" id="tool-erase" onclick="seErase()">&#9003; 지우개</button>
      <span style="width:1px;height:22px;background:var(--border);margin:0 2px"></span>
      ${SE_COLORS.map(c => `<span class="se-color ${c === SE.color ? 'active' : ''}" data-c="${c}" style="background:${c}" onclick="seColor('${c}')"></span>`).join('')}
      <button class="se-tool" style="margin-left:auto" onclick="seClearDraw()">필기 지우기</button>
    </div>
    <div class="se-page-wrap">
      <div class="se-page" style="height:${pageH}px">
        <textarea class="se-text" id="se-text" placeholder="설교 내용을 입력하세요...">${esc(p.text || '')}</textarea>
        <canvas class="se-canvas" id="se-canvas" data-h="${pageH}"></canvas>
      </div>
    </div>
    <div class="se-pagenav">
      <button class="btn-icon" onclick="sePage(-1)">&larr;</button>
      <span style="font-weight:600">${SE.cur + 1} / ${SE.pages.length}</span>
      <button class="btn-icon" onclick="sePage(1)">&rarr;</button>
      <button class="btn btn-sm btn-secondary" onclick="seAddPage()">+ 페이지</button>
      ${SE.pages.length > 1 ? `<button class="btn btn-sm btn-secondary" onclick="seDeletePage()" style="color:var(--danger)">페이지 삭제</button>` : ''}
    </div>`;
  setupSermonCanvas();
}

function setupSermonCanvas() {
  const canvas = $('#se-canvas');
  if (!canvas) return;
  const page = SE.pages[SE.cur];
  const W = canvas.parentElement.clientWidth;
  const H = parseInt(canvas.dataset.h);
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (page.drawing) { const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0, W, H); img.src = page.drawing; }
  canvas.style.pointerEvents = SE.pen ? 'auto' : 'none';

  let drawing = false, lx = 0, ly = 0;
  const pos = e => { const r = canvas.getBoundingClientRect(); return [e.clientX - r.left, e.clientY - r.top]; };
  canvas.addEventListener('pointerdown', e => { if (!SE.pen) return; drawing = true; try { canvas.setPointerCapture(e.pointerId); } catch (x) {} [lx, ly] = pos(e); });
  canvas.addEventListener('pointermove', e => {
    if (!drawing) return;
    const [x, y] = pos(e);
    ctx.globalCompositeOperation = SE.erase ? 'destination-out' : 'source-over';
    ctx.strokeStyle = SE.color;
    ctx.lineWidth = SE.erase ? 22 : (e.pressure ? 1 + e.pressure * 3 : 2.5);
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(x, y); ctx.stroke();
    [lx, ly] = [x, y];
  });
  const end = () => { if (drawing) { drawing = false; SE.pages[SE.cur].drawing = canvas.toDataURL('image/png'); } };
  canvas.addEventListener('pointerup', end);
  canvas.addEventListener('pointerleave', end);
  canvas.addEventListener('pointercancel', end);
}

function seCapture() {
  const t = $('#se-text'); if (t) SE.pages[SE.cur].text = t.value;
  if ($('#se-title')) SE.title = $('#se-title').value;
  if ($('#se-date')) SE.date = $('#se-date').value;
  if ($('#se-preacher')) SE.preacher = $('#se-preacher').value;
  if ($('#f-ref')) SE.reference = $('#f-ref').value;
}

window.sePen = function(on) {
  SE.pen = on; SE.erase = false;
  $('#se-canvas').style.pointerEvents = on ? 'auto' : 'none';
  const t = $('#se-text'); t.readOnly = on; t.style.pointerEvents = on ? 'none' : 'auto';
  $('#tool-pen').classList.toggle('active', on);
  $('#tool-type').classList.toggle('active', !on);
  $('#tool-erase').classList.remove('active');
};
window.seErase = function() {
  if (!SE.pen) sePen(true);
  SE.erase = !SE.erase;
  $('#tool-erase').classList.toggle('active', SE.erase);
};
window.seColor = function(c) {
  SE.color = c; SE.erase = false;
  if (!SE.pen) sePen(true);
  $('#tool-erase').classList.remove('active');
  $$('.se-color').forEach(el => el.classList.toggle('active', el.dataset.c === c));
};
window.seClearDraw = function() {
  if (!confirm('이 페이지의 필기를 지울까요?')) return;
  SE.pages[SE.cur].drawing = null;
  renderSermonEditor();
};
window.sePage = function(dir) {
  seCapture();
  const n = SE.cur + dir;
  if (n < 0 || n >= SE.pages.length) return;
  SE.cur = n; renderSermonEditor();
};
window.seAddPage = function() {
  seCapture();
  SE.pages.push({ text: '', drawing: null });
  SE.cur = SE.pages.length - 1; renderSermonEditor();
};
window.seDeletePage = function() {
  if (SE.pages.length <= 1) return;
  if (!confirm('이 페이지를 삭제할까요?')) return;
  seCapture();
  SE.pages.splice(SE.cur, 1);
  if (SE.cur >= SE.pages.length) SE.cur = SE.pages.length - 1;
  renderSermonEditor();
};
window.closeSermonEditor = function() { SE = null; renderSermons(); };

window.saveSermonEditor = async function() {
  seCapture();
  const data = {
    date: SE.date, title: SE.title || '(제목 없음)',
    preacher: SE.preacher, reference: SE.reference,
    content: serializePages(SE.pages),
  };
  if (SE.id) { data.id = SE.id; await dbPut('sermons', data); }
  else { await dbAdd('sermons', data); }
  toast('설교노트가 저장되었습니다');
  SE = null; renderSermons();
};

// === SHARED ===
window.toggleField = async function(store, id, field, current) {
  const item = await dbGet(store, id);
  item[field] = current ? 0 : 1;
  await dbPut(store, item);
  renderPage();
};

window.deleteItem = async function(store, id) {
  if (!confirm('이 항목을 삭제하시겠습니까?')) return;
  await dbDelete(store, id);
  toast('삭제되었습니다'); renderPage();
};

window.exportBackup = exportBackup;
window.importBackup = importBackup;

renderPage();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
